<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Progress Bars Project</title>

  <!-- Bootstrap 4 CDN -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body class="container mt-4">

  <h2 class="text-center mb-4">Progress Bars Demo</h2>

  <!-- Basic -->
  <h4>Basic Progress</h4>
  <div class="progress mb-3">
    <div class="progress-bar" style="width:60%"></div>
  </div>

  <!-- Height -->
  <h4>Custom Height</h4>
  <div class="progress mb-3" style="height:25px">
    <div class="progress-bar bg-success" style="width:70%; height:25px"></div>
  </div>

  <!-- Label -->
  <h4>Progress with Label</h4>
  <div class="progress mb-3">
    <div class="progress-bar bg-info" style="width:80%">80%</div>
  </div>

  <!-- Colors -->
  <h4>Colored Progress Bars</h4>
  <div class="progress mb-2">
    <div class="progress-bar bg-success" style="width:50%">Success</div>
  </div>
  <div class="progress mb-2">
    <div class="progress-bar bg-warning" style="width:60%">Warning</div>
  </div>
  <div class="progress mb-2">
    <div class="progress-bar bg-danger" style="width:70%">Danger</div>
  </div>

  <!-- Striped -->
  <h4>Striped Progress</h4>
  <div class="progress mb-3">
    <div class="progress-bar progress-bar-striped bg-primary" style="width:65%"></div>
  </div>

  <!-- Animated -->
  <h4>Animated Progress</h4>
  <div class="progress mb-3">
    <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width:75%"></div>
  </div>

  <!-- Stacked -->
  <h4>Stacked Progress Bars</h4>
  <div class="progress mb-3">
    <div class="progress-bar bg-success" style="width:40%">Free</div>
    <div class="progress-bar bg-warning" style="width:20%">Warning</div>
    <div class="progress-bar bg-danger" style="width:10%">Danger</div>
  </div>

  <!-- Real UI Example -->
  <h4>Project Status</h4>
  <p>HTML</p>
  <div class="progress mb-2">
    <div class="progress-bar bg-success" style="width:90%">90%</div>
  </div>

  <p>CSS</p>
  <div class="progress mb-2">
    <div class="progress-bar bg-info" style="width:80%">80%</div>
  </div>

  <p>JavaScript</p>
  <div class="progress mb-2">
    <div class="progress-bar bg-warning" style="width:60%">60%</div>
  </div>

</body>
</html>
